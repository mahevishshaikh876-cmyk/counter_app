<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
    <style>
        body {

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:white;
            font-family: Arial;
        }
        .box {
            width: 300px;
            padding: 30px;
            background: white;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0px 8px 16px gray;
        }
        h1 {
            color:black;
        }
        #count {
            font-size: 50px;
            margin: 20px;
            color: darkblue;
        }
        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            color: white;

        }
        .plus {

            background: black;

        }
        .minus {

            background: black;

        }
        .reset {

            background: black;

        }
        button:hover {
            scale: 0.8;
        }
    </style>
</head>

<body>
    <div class="box">
  <h1><b> Counter App</b></h1>
        <div id="count"> 0</div>
        <button class="minus" onclick="dec()"> -</button>
        <button class="plus" onclick="inc()">+</button>
        <button class="reset" onclick="reset()"> RESET</button>
    </div>
    <script>
        let count = 0;
        function inc() {
            count+=1;
            document.getElementById("count").innerText = count;
        }
        function dec() {
            count-=1;
            document.getElementById("count").innerText = count;
        }
        function reset() {
            count=0;
            document.getElementById("count").innerText = count;

        }
    </script>
</body>
</html>
